<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portia PCRA</title>
<link rel="icon" type="image/png" href="assets/favicon.png"/>
<link rel="apple-touch-icon" href="assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  /* Apply persisted (or system-preferred) theme BEFORE first paint so the
     user never sees a flash of the wrong theme. Mirrors the public API
     used by app.js — keep them in sync. */
  (function () {
    try {
      var stored = localStorage.getItem("portia.theme");
      var theme = stored === "light" || stored === "dark"
        ? stored
        : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  })();
</script>
<script>
  /* Apply the initial language BEFORE first paint so the loading spinner
     label renders in the right language. Resolution order:
     ?lang= URL param → localStorage "portia.lang" → navigator.language
     → "en". Storage key + supported list are mirrored in app.js — keep
     them in sync. */
  (function () {
    try {
      var supported = ["en", "es"];
      var pick = null;
      var m = window.location.search.match(/[?&]lang=([a-zA-Z-]+)/);
      if (m) {
        var u = decodeURIComponent(m[1]).toLowerCase().slice(0, 2);
        if (supported.indexOf(u) >= 0) pick = u;
      }
      if (!pick) {
        var stored = localStorage.getItem("portia.lang");
        if (stored && supported.indexOf(stored) >= 0) pick = stored;
      }
      if (!pick) {
        var nav = (navigator.language || "en").toLowerCase().slice(0, 2);
        if (supported.indexOf(nav) >= 0) pick = nav;
      }
      document.documentElement.setAttribute("lang", pick || "en");
    } catch (e) {
      document.documentElement.setAttribute("lang", "en");
    }
  })();
</script>
<style>
  /* Critical CSS — inlined so it paints on first render, before style.css
     loads and before app.js fetches the gist payload. Without this, the
     user briefly sees a blank/white page while the network requests run.
     Keep colors in sync with style.css :root tokens. */
  html, body { height: 100%; margin: 0; }
  html[data-theme="dark"], html[data-theme="dark"] body { background: #25231f; }
  html[data-theme="light"], html[data-theme="light"] body { background: #f5f2eb; }
  html[data-theme="dark"] body { color: #c7c4be; }
  html[data-theme="light"] body { color: #2a2823; }
  body { font-family: 'Inter', -apple-system, Segoe UI, sans-serif; }
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; z-index: 9999;
    transition: opacity 0.25s ease;
  }
  html[data-theme="dark"] #loading { background: #25231f; }
  html[data-theme="light"] #loading { background: #f5f2eb; }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 42px; height: 42px;
    border: 3px solid #444139;
    border-top-color: #8bbc3a;
    border-radius: 50%;
    animation: portia-spin 0.9s linear infinite;
  }
  html[data-theme="light"] #loading .spinner {
    border-color: #dcd6c9;
    border-top-color: #5a8c1f;
  }
  #loading .label {
    color: #a8a399; font-size: 0.78rem;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  html[data-theme="light"] #loading .label { color: #5e5b52; }
  /* Lang-aware loading label. Driven by <html lang> set by the inline
     script in <head> before first paint. Keep keys in sync with app.js. */
  #loading .label::after { content: "Loading dashboard…"; }
  html[lang="es"] #loading .label::after { content: "Cargando panel…"; }
  @keyframes portia-spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    #loading .spinner { animation-duration: 2.4s; }
  }
</style>
<link rel="stylesheet" href="style.css"/>
<noscript>
  <style>
    /* If JS is disabled, app.js can't hide the spinner — so hide it here
       and let the <noscript> message in <body> take over. */
    #loading { display: none; }
  </style>
</noscript>
</head>
<body>
<div id="loading" role="status" aria-live="polite" aria-label="Loading dashboard">
  <div class="spinner" aria-hidden="true"></div>
  <div class="label"></div>
</div>
<noscript>
  <div style="padding:40px;color:#c7c4be;background:#0d0b08;text-align:center;">
    <h2>JavaScript required</h2>
    <p>This dashboard renders client-side. Please enable JavaScript and reload.</p>
  </div>
</noscript>
<div class="app" id="app" hidden>
  <aside class="sidebar">
    <div class="brand">
      <img class="brand-logo" src="assets/atram_logo.png" alt="Atram"/>
    </div>
    <nav class="nav" id="nav"></nav>
    <button type="button" id="theme-toggle" class="theme-switch"
            role="switch" aria-label="Toggle light/dark theme"
            title="Toggle light/dark theme">
      <span class="theme-switch-knob" aria-hidden="true"></span>
      <span class="theme-switch-side is-light">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <span>Light</span>
      </span>
      <span class="theme-switch-side is-dark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <span>Dark</span>
      </span>
    </button>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-eyebrow" id="topbar-eyebrow"></div>
        <div class="topbar-title-row">
          <h1 class="topbar-title" id="title"></h1>
          <span class="tier-chip" id="tier-chip"></span>
        </div>
      </div>
      <div class="topbar-right">
        <label class="lang-switcher">
          <span class="lang-switcher-icon" aria-hidden="true">🌐</span>
          <select id="lang-switcher" aria-label="Language">
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
        </label>
      </div>
    </header>
    <div class="content">
      <div id="tab-summary" class="panel active">
        <div id="summary-narrative" class="summary-narrative" hidden></div>
        <div id="coverage-banner" class="coverage-banner" hidden></div>
        <div class="kpi-row" id="kpis"></div>
        <div class="section-title">Hazard exposure profile (portfolio mean, 0&ndash;4 scale)</div>
        <div class="card" id="hazard-bars"></div>
        <div id="worst-best"></div>
      </div>
      <div id="tab-branches" class="panel">
        <div id="branches-note" class="card-sub mb12"></div>
        <div id="branch-filters" class="branch-filters" hidden></div>
        <div id="branch-count" class="card-sub mb12" hidden></div>
        <div class="tbl-wrap"><table>
          <thead><tr id="branch-thead"></tr></thead>
          <tbody id="branch-tbody"></tbody>
        </table></div>
      </div>
      <div id="tab-water" class="panel"></div>
      <div id="tab-trajectory" class="panel"></div>
      <div id="tab-site" class="panel"></div>
      <div id="tab-context" class="panel"></div>
      <div id="tab-methodology" class="panel"></div>
    </div>
    <div class="ftr">
      <span id="ftr-text"></span>
    </div>
  </main>
</div>
<div id="error" hidden></div>
<script src="app.js"></script>
</body>
</html>
