name: Deploy to GitHub Pages

# The legacy branch-based Pages builder ran Jekyll over the repo and
# silently failed once the codebase grew. This workflow replaces it with
# an explicit upload-pages-artifact + deploy-pages flow. No Jekyll, no
# magic. Pushes to main deploy the working tree as-is.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
